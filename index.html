<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cool Vibes</title>

        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>

        <section class="hero">
            <h1>⚡ Crear usuario ⚡</h1>
            <form id="userForm" class="user-form">
                <input
                    type="text"
                    id="name"
                    placeholder="Nombre"
                    required>
                <input
                    type="email"
                    id="email"
                    placeholder="Correo"
                    required>
                <button type="submit" id="saveButton">
                    Guardar usuario
                </button>
            </form>
        </section>

        <section class="hero">
            <h1>⚡ Usuarios ⚡</h1>
            <div id="userContainer" class="user-container"></div>
        </section>

        <footer>
            © 2026 - Hernan Dagata 
        </footer>

        <script
            src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
        </script>
        <script src="js/app.js"></script>

    </body>
</html>
